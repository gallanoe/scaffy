# Scaffy configuration
# Copy this file to scaffy.yaml and fill in your values.

# Required: OpenRouter API key
api_key: ""

# OpenRouter base URL
# base_url: "https://openrouter.ai/api/v1"

# Model to use
# model: "anthropic/claude-sonnet-4"

# Max tokens for completions
# max_tokens: 4096

# Sampling temperature
# temperature: 0.7

# System prompt
# system_prompt: "You are a helpful assistant."

# Bash command timeout in seconds
# bash_timeout: 30

# Brave Search API key for web_search tool
# brave_api_key: ""

# Tools to enable (all enabled by default if omitted)
# tools:
#   - read_file
#   - write_file
#   - edit_file
#   - list_directory
#   - search_files
#   - grep_search
#   - bash_exec
#   - web_fetch
#   - web_search
#   - echo
